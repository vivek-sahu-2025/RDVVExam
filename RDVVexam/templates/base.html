<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RDVV Exam | Notes & PYQs</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; }
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="bg-gray-900 text-white flex flex-col min-h-screen">

    <nav class="glass sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <a href="/" class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">
                RDVV<span class="text-white">Exam</span>
            </a>
            
            <div class="hidden md:flex space-x-6">
                <a href="/" class="hover:text-blue-400 transition">Home</a>
                <a href="{%url 'about'%}" class="hover:text-blue-400 transition">About</a>
                <a href="{%url 'about'%}" class="px-4 py-2 bg-blue-600 rounded-full hover:bg-blue-700 transition">Upload Notes</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="bg-gray-950 py-8 mt-10">
        <div class="container mx-auto px-4 text-center">
            <p class="text-gray-400">Built with ❤️ for RDVV Students</p>
            <p class="text-sm text-gray-600 mt-2">Developed by Vivek Sahu - <span class="text-yellow-500 font-bold">Decode Web Tech</span></p>
        </div>
    </footer>

</body>
</html>
