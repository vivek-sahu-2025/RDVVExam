{% extends 'base.html' %}

{% block content %}
<div class="container mx-auto px-4 py-12">
    <p class="text-gray-400 mb-6">
        <a href="{% url 'home' %}" class="hover:text-blue-400">Home</a> > 
        <a href="{% url 'semesters' semester.course.id %}" class="hover:text-blue-400">{{ semester.course.name }}</a> > 
        <span class="text-white">{{ semester.semester_number }}</span>
    </p>

    <h2 class="text-3xl font-bold mb-8">Pick a Subject 📚</h2>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
        {% for subject in subjects %}
           <a href="{% url 'subject_detail' subject.id %}" class="group">            <div class="glass p-6 rounded-xl hover:bg-gray-800 transition duration-300 border border-gray-700 text-center">
                <div class="w-16 h-16 bg-blue-900/50 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">
                    📖
                </div>
                <h3 class="text-lg font-bold text-white group-hover:text-blue-400">{{ subject.name }}</h3>
            </div>
        </a>
        {% empty %}
        <p class="text-gray-500">No subjects added yet.</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
