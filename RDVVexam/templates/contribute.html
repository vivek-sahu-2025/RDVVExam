{% extends 'base.html' %}
{% block content %}

<section class="pt-32 pb-12 bg-slate-950 border-b border-slate-800">
    <div class="max-w-4xl mx-auto px-6 text-center">
        <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-indigo-500/10 text-indigo-400 font-medium text-sm mb-6 border border-indigo-500/20">
            <i class="ph ph-handshake text-lg"></i> Students Helping Students
        </div>
        <h1 class="text-4xl md:text-5xl font-bold text-white mb-4">
            Contribute Study Material
        </h1>
        <p class="text-gray-400 text-lg">
            Upload your PDF or Images to help your juniors and batchmates score better!
        </p>
    </div>
</section>

<section class="py-16 bg-slate-900">
    <div class="max-w-4xl mx-auto px-6">
        
        <div class="bg-slate-800/50 backdrop-blur-sm border border-slate-700 rounded-2xl p-8 shadow-2xl">
            
            <form id="contributionForm" class="space-y-6">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-slate-300 text-sm font-medium mb-2">Full Name *</label>
                        <input type="text" id="name" required placeholder="Vivek Sahu"
                               class="w-full px-4 py-3 rounded-xl bg-slate-900 text-white border border-slate-700 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 focus:outline-none transition">
                    </div>
                    <div>
                        <label class="block text-slate-300 text-sm font-medium mb-2">College Name *</label>
                        <input type="text" id="college" required placeholder="Tilak College Katni"
                               class="w-full px-4 py-3 rounded-xl bg-slate-900 text-white border border-slate-700 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 focus:outline-none transition">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div>
                        <label class="block text-slate-300 text-sm font-medium mb-2">Course Name * ( jise ap share karna chahte hain)</label>
                        <input type="text" id="course" required placeholder="B.Sc / BCA / B.Com"
                               class="w-full px-4 py-3 rounded-xl bg-slate-900 text-white border border-slate-700 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 focus:outline-none transition">
                    </div>
                    <div>
                        <label class="block text-slate-300 text-sm font-medium mb-2">Class / Sem *</label>
                        <input type="text" id="class_name" required placeholder="1st Year/Semester"
                               class="w-full px-4 py-3 rounded-xl bg-slate-900 text-white border border-slate-700 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 focus:outline-none transition">
                    </div>
                    <div>
                        <label class="block text-slate-300 text-sm font-medium mb-2">Year *</label>
                        <input type="text" id="year" required placeholder="2024"
                               class="w-full px-4 py-3 rounded-xl bg-slate-900 text-white border border-slate-700 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 focus:outline-none transition">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-slate-300 text-sm font-medium mb-2">Subject Name *</label>
                        <input type="text" id="subject" required placeholder="Advanced Mathematics"
                               class="w-full px-4 py-3 rounded-xl bg-slate-900 text-white border border-slate-700 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 focus:outline-none transition">
                    </div>
                    <div>
                        <label class="block text-slate-300 text-sm font-medium mb-2">What are you sharing? *</label>
                        <select id="material_type" required
                                class="w-full px-4 py-3 rounded-xl bg-slate-900 text-white border border-slate-700 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 focus:outline-none transition appearance-none">
                            <option value="" disabled selected>Select an option...</option>
                            <option value="Notes">Handwritten / Typed Notes</option>
                            <option value="PYQ">Previous Year Question (PYQ)</option>
                            <option value="Syllabus">Syllabus Copy</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-slate-300 text-sm font-medium mb-2">Upload File (PDF/Image) *</label>
                        <input type="file" id="fileUpload" required accept=".pdf, image/*"
                               class="w-full px-4 py-2.5 rounded-xl bg-slate-900 text-white border border-slate-700 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-indigo-600 file:text-white hover:file:bg-indigo-700 transition">
                        <p class="text-xs text-slate-500 mt-1">Max file size: 5MB</p>
                    </div>
                    <div>
                        <label class="block text-slate-300 text-sm font-medium mb-2 flex justify-between">
                            Phone Number <span class="text-slate-500 text-xs mt-1">(Optional)</span>
                        </label>
                        <input type="text" id="phone" placeholder="Enter WhatsApp number"
                               class="w-full px-4 py-3 rounded-xl bg-slate-900 text-white border border-slate-700 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 focus:outline-none transition">
                    </div>
                </div>

                <div class="pt-4">
                    <button type="submit" id="submitBtn"
                            class="w-full bg-indigo-600 text-white font-bold text-lg py-4 rounded-xl hover:bg-indigo-700 hover:shadow-lg hover:shadow-indigo-500/20 transition duration-300 flex justify-center items-center gap-2">
                        <i class="ph ph-cloud-arrow-up text-xl"></i> Upload & Submit
                    </button>
                    
                    <div id="statusMessage" class="text-center mt-4 hidden font-medium"></div>
                </div>

            </form>
        </div>

    </div>
</section>

<script>
    // BHAII YAHAN APNA NAYA WEB APP URL PASTE KAR DENA
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyf09gjd_k8NloTzCxPNjlo7nNITfEynoFqpwZHuxGTFtvRvRrtYDyA5b3J_UdsUIvcNw/exec'; 
    
    const form = document.getElementById('contributionForm');
    const submitButton = document.getElementById('submitBtn');
    const msg = document.getElementById('statusMessage');

    form.addEventListener('submit', e => {
        e.preventDefault(); 
        
        const fileInput = document.getElementById('fileUpload');
        const file = fileInput.files[0];

        // 5MB Size Limit Check (Jisse Script Crash Na Ho)
        if (file && file.size > 5 * 1024 * 1024) {
            alert("Bhai file thodi badi hai! Please 5MB se choti file upload karo.");
            return;
        }

        // Button Loading UI
        const originalBtnText = submitButton.innerHTML;
        submitButton.innerHTML = '<i class="ph ph-spinner animate-spin text-xl"></i> Uploading... Please wait';
        submitButton.disabled = true;
        submitButton.classList.add('opacity-75', 'cursor-not-allowed');

        const reader = new FileReader();
        
        reader.onload = function(event) {
            // File ko data me convert kiya
            const base64Data = event.target.result.split(',')[1]; 
            
            // Payload banaya
            const payload = {
                name: document.getElementById('name').value,
                college: document.getElementById('college').value,
                course: document.getElementById('course').value,
                class_name: document.getElementById('class_name').value,
                year: document.getElementById('year').value,
                subject: document.getElementById('subject').value,
                material_type: document.getElementById('material_type').value,
                phone: document.getElementById('phone').value,
                fileName: file.name,
                mimeType: file.type,
                fileData: base64Data
            };

            // Server pe bheja
            fetch(scriptURL, { 
                method: 'POST', 
                body: JSON.stringify(payload)
            })
            .then(response => response.json())
            .then(data => {
                if(data.result === "success") {
                    msg.textContent = "🎉 File Uploaded Successfully! Thanks for helping others.";
                    msg.className = "text-center mt-4 text-green-400 font-medium block";
                    form.reset();
                } else {
                    msg.textContent = "❌ Oops! Error: " + data.message;
                    msg.className = "text-center mt-4 text-red-400 font-medium block";
                }
                
                submitButton.innerHTML = originalBtnText;
                submitButton.disabled = false;
                submitButton.classList.remove('opacity-75', 'cursor-not-allowed');
                
                setTimeout(() => { msg.classList.add('hidden'); }, 5000);
            })
            .catch(error => {
                console.error('Error!', error);
                msg.textContent = "❌ Network Error! Please try again.";
                msg.className = "text-center mt-4 text-red-400 font-medium block";
                
                submitButton.innerHTML = originalBtnText;
                submitButton.disabled = false;
                submitButton.classList.remove('opacity-75', 'cursor-not-allowed');
            });
        };
        
        // File read start karna
        if(file) {
            reader.readAsDataURL(file);
        }
    });
</script>

{% endblock %}
