{% extends 'base.html' %}

{% block content %}
<div class="container mx-auto px-4 py-12">
    <p class="text-gray-400 mb-6">
        <a href="{% url 'home' %}" class="hover:text-blue-400">Home</a> > <span class="text-white">{{ course.name }}</span>
    </p>

    <h2 class="text-3xl font-bold mb-8">Select Your Semester / Year 📅</h2>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        {% for sem in semesters %}
        <a href="{% url 'subjects' sem.id %}" class="group">
            <div class="glass p-8 rounded-2xl hover:bg-gray-800 transition duration-300 border-l-4 border-purple-500">
                <h3 class="text-2xl font-bold text-white group-hover:text-purple-400">{{ sem.semester_number }}</h3>
                <p class="text-gray-400 mt-2">Tap to view Subjects</p>
            </div>
        </a>
        {% empty %}
        <p class="text-gray-500">No semesters added yet.</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
